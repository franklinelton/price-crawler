name: Coleta de Preços Diária

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install httpx beautifulsoup4

      - name: Executar crawler
        run: python crawler.py

      - name: Salvar resultados
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Preços: $(date '+%Y-%m-%d')"
          git push
