name: Dispatcher

on:
  repository_dispatch:
    types: [run-crawler]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar senha
        run: |
          if [ "${{ github.event.client_payload.senha }}" != "${{ secrets.DISPATCH_SENHA }}" ]; then
            echo "Senha incorreta"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install httpx beautifulsoup4

      - name: Executar crawler
        run: python crawler.py

      - name: Salvar resultados
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Preços: $(date '+%Y-%m-%d %H:%M')"
          git push
